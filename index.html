


<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title></title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* 🌌 PARTICLE BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2;
}

/* GRID DIGITAL */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        90deg,
        rgba(0,255,255,0.05) 0px,
        rgba(0,255,255,0.05) 1px,
        transparent 1px,
        transparent 40px
    ),
    repeating-linear-gradient(
        0deg,
        rgba(0,255,255,0.05) 0px,
        rgba(0,255,255,0.05) 1px,
        transparent 1px,
        transparent 40px
    );
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    font-size: 3em;
    color: cyan;
    text-shadow: 0 0 20px cyan, 0 0 40px #00ffff;
}

/* GRID PRODUK */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    padding: 30px;
}

/* CARD */
.product {
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    border: 1px solid #00ffff55;
    backdrop-filter: blur(10px);
    transition: 0.4s;
}

/* HOVER EFFECT */
.product:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 25px cyan, 0 0 50px #00ffff88;
}

/* GAMBAR */
.product img {
    width: 100%;
    border-radius: 10px;
    transition: 0.4s;
}

/* GAMBAR GERAK */
.product:hover img {
    transform: scale(1.1);
    filter: brightness(1.3) drop-shadow(0 0 15px cyan);
}

/* TEXT */
.name {
    margin: 10px 0;
    font-size: 1.2em;
}

.price {
    color: cyan;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px;
    background: cyan;
    color: black;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
}

.btn:hover {
    background: #00aaff;
    color: white;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

        <a class="btn" href="https://www.instagram.com/radityazhang?igsh=MWZzMXB3a2o5aTFxdQ==">Beli</a>

        <a class="btn" href="https://www.instagram.com/radityazhang?igsh=MWZzMXB3a2o5aTFxdQ==">Beli</a>
    </div>

</div>

<footer>ig radityazhang</footer>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: Math.random() * 2 - 1,
        vy: Math.random() * 2 - 1
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "cyan";

    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
